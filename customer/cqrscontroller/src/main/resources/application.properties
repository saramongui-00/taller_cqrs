spring.application.name=cqrscontroller
server.port=8080

#datasource
spring.datasource.url=jdbc:mysql://localhost:3306/orders?serverTimezone=GMT-5
spring.datasource.username=orders
spring.datasource.password=uptc2026
spring.jpa.database=mysql
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto= update

#kafka
spring.kafka.bootstrap-servers=localhost:29092
spring.kafka.producer.retries=1
spring.kafka.producer.group-id=customer-group
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
